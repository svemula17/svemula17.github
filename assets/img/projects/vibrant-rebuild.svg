  <rect x="412" y="624" width="138" height="58" rx="18" fill="#60a5fa"/>
  <rect x="564" y="624" width="138" height="58" rx="18" fill="#f59e0b"/>
  <text x="289" y="661" fill="#04111b" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Home</text>
  <text x="432" y="661" fill="#04111b" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Services</text>
  <text x="590" y="661" fill="#04111b" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Contact</text>

  <text x="824" y="414" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700">Lead generation tuned for clarity</text>
  <text x="824" y="454" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="400">A smaller path from first visit to contact form submission.</text>
