  <rect x="1030" y="492" width="190" height="34" rx="17" fill="#60a5fa" fill-opacity="0.35"/>
  <rect x="1236" y="492" width="114" height="34" rx="17" fill="#f59e0b" fill-opacity="0.35"/>
  <text x="852" y="515" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600">SEO metadata</text>
  <text x="1061" y="515" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600">CMS-ready</text>
  <text x="1258" y="515" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600">Contact</text>

  <rect x="824" y="626" width="236" height="110" rx="24" fill="#ffffff" fill-opacity="0.08"/>
  <rect x="1082" y="626" width="236" height="110" rx="24" fill="#ffffff" fill-opacity="0.08"/>
  <text x="858" y="668" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Home</text>
  <text x="858" y="700" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="400">Hero, services, and trust signals.</text>
  <text x="1118" y="668" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Conversion</text>
  <text x="1118" y="700" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="400">Simple contact flow and stronger CTA.</text>

  <text x="824" y="792" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="500">Built to feel easier to trust, easier to scan, and easier to maintain.</text>
