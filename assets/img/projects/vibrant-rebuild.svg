<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Vibrant Inc Rebuild preview</title>
  <desc id="desc">Abstract marketing-site mockup for a cleaner Next.js rebuild focused on SEO, content, and conversion.</desc>
  <defs>
    <linearGradient id="bg" x1="140" y1="90" x2="1460" y2="930" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111f"/>
      <stop offset="0.55" stop-color="#0f2740"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1250 220) rotate(118) scale(360 480)">
      <stop stop-color="#34d399" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(300 760) rotate(10) scale(300 220)">
      <stop stop-color="#60a5fa" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#60a5fa" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="1000" rx="48" fill="url(#bg)"/>
  <circle cx="1260" cy="210" r="250" fill="url(#glowA)"/>
  <circle cx="320" cy="790" r="220" fill="url(#glowB)"/>

