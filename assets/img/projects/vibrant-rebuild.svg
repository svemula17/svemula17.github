  <text x="260" y="430" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="700" letter-spacing="-0.03em">Vibrant Inc Rebuild</text>
  <text x="260" y="480" fill="#d1fae5" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="500">Clearer IA, stronger branding, and a cleaner path to contact</text>
  <text x="260" y="534" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="400">Next.js App Router build with SEO metadata, redirects, robots, and sitemap support.</text>
  <text x="260" y="570" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="400">CMS-ready content collections and a lighter experience that is easier to maintain.</text>

