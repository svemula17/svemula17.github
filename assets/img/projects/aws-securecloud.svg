<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d">
  <title id="t">AWS SecureCloud preview</title>
  <desc id="d">Abstract diagram of a secure AWS environment with VPC, IAM, and threat-detection services.</desc>
  <defs>
    <linearGradient id="bg" x1="160" y1="80" x2="1440" y2="940" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0a1326"/>
      <stop offset="0.55" stop-color="#102a43"/>
      <stop offset="1" stop-color="#ff9900"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1240 230) rotate(130) scale(440 560)">
      <stop stop-color="#ffb454" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#ffb454" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="200" y1="230" x2="1340" y2="810" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="acc" x1="420" y1="220" x2="1220" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff9900"/>
      <stop offset="1" stop-color="#ffd28a"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" rx="48" fill="url(#bg)"/>
  <circle cx="1300" cy="220" r="260" fill="url(#glow)"/>
  <circle cx="240" cy="820" r="180" fill="#38bdf8" fill-opacity="0.16"/>
  <circle cx="520" cy="150" r="92" fill="#ff9900" fill-opacity="0.14"/>
  <rect x="170" y="150" width="1260" height="700" rx="44" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.14"/>

  <!-- title -->
  <text x="232" y="262" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="700" letter-spacing="-0.03em">AWS SecureCloud</text>
  <text x="234" y="312" fill="#ffd7a8" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="500">Hardened VPC · least-privilege IAM · threat detection</text>

  <!-- VPC container -->
  <rect x="232" y="360" width="700" height="420" rx="28" fill="#08121f" fill-opacity="0.7" stroke="#38bdf8" stroke-opacity="0.4" stroke-dasharray="10 8"/>
  <text x="260" y="402" fill="#8fd3ff" font-family="'JetBrains Mono', monospace" font-size="20" letter-spacing="0.1em">VPC 10.0.0.0/16</text>

  <rect x="262" y="424" width="300" height="150" rx="18" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.12"/>
  <text x="284" y="462" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600">Public Subnet</text>
  <rect x="284" y="482" width="120" height="62" rx="12" fill="url(#acc)" fill-opacity="0.85"/>
  <text x="300" y="520" fill="#0a1326" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">WAF</text>

  <rect x="600" y="424" width="300" height="150" rx="18" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.12"/>
  <text x="622" y="462" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600">Private Subnet</text>
  <rect x="622" y="482" width="120" height="62" rx="12" fill="#38bdf8" fill-opacity="0.3"/>
  <text x="640" y="520" fill="#e0f2fe" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">RDS · S3</text>

  <!-- shield -->
  <path d="M592 612 l0 0 c46 18 92 18 138 0 l0 70 c0 52 -36 84 -69 100 c-33 -16 -69 -48 -69 -100 z" fill="url(#acc)" fill-opacity="0.9"/>
  <path d="M610 660 l14 14 l26 -30" stroke="#0a1326" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="262" y="668" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600">CloudTrail · Config</text>
  <text x="262" y="700" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="15">IAM roles · MFA · KMS encryption</text>
  <text x="262" y="742" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="15">Lambda auto-remediation</text>

  <!-- detection services column -->
  <rect x="968" y="360" width="402" height="420" rx="28" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.12"/>
  <text x="996" y="402" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Threat Detection</text>

  <g font-family="Inter, Arial, sans-serif" font-size="19" font-weight="600">
    <rect x="996" y="424" width="346" height="62" rx="14" fill="#ff9900" fill-opacity="0.16"/>
    <circle cx="1028" cy="455" r="9" fill="#ff9900"/><text x="1052" y="461" fill="#ffe3bf">GuardDuty</text>
    <rect x="996" y="500" width="346" height="62" rx="14" fill="#38bdf8" fill-opacity="0.14"/>
    <circle cx="1028" cy="531" r="9" fill="#38bdf8"/><text x="1052" y="537" fill="#d7eefe">Security Hub</text>
    <rect x="996" y="576" width="346" height="62" rx="14" fill="#22c55e" fill-opacity="0.14"/>
    <circle cx="1028" cy="607" r="9" fill="#22c55e"/><text x="1052" y="613" fill="#d7f7e1">Inspector · Vuln scans</text>
    <rect x="996" y="652" width="346" height="62" rx="14" fill="#a78bfa" fill-opacity="0.16"/>
    <circle cx="1028" cy="683" r="9" fill="#a78bfa"/><text x="1052" y="689" fill="#ece4ff">CloudFormation IaC</text>
  </g>
</svg>
